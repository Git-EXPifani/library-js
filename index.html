<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Library JS</title>
  </head>
  <body>
    <header>
      <div class="header-text">Library 📚</div>
      <button class="header-btn" form="bookForm">+New</button>
    </header>
    <form id="bookForm" method="post">
      <fieldset>
        <legend>Add your book's details here and press NEW uptop!</legend>
        <div class="form-group">
          <label for="title-form">Enter Book's Name:</label>
          <input type="text" id="title-form" />
        </div>
        <div class="form-group">
          <label for="author-form">Enter Book's Author:</label>
          <input type="text" id="author-form" />
        </div>
        <div class="form-group">
          <label for="pages-form">Number of pages: </label>
          <input type="text" id="pages-form" />
        </div>
        <div class="form-group">
          <label for="status-form">Have you read it? </label>
          <input type="checkbox" id="checkbox-form" />
        </div>
      </fieldset>
    </form>
    <div class="library"></div>
    <script src="script.js"></script>
  </body>
</html>
